<!DOCTYPE html>
<html lang="ko">
<head>

    <title>김중석 홈페이지</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: white;
        }
        h1{
            height: 80px;
            text-align: center;
        }
        .container {
            width: 1200px;
            margin: 0 auto;
           
        }

        /* 4. 각 행(Row)을 가로로 나란히 배치 (Flexbox) */
        .html1, .html2, .html3 {
            display: flex;
            justify-content: space-between; /* 3개의 박스를 좌우로 균등하게 분배 */
            gap: 20px; /* 박스 사이의 간격 */
        }

        /* 5. 개별 카드(박스) 스타일 (둥근 테두리, 내부 정렬) */
        .div1, .div2, .div3 {
            width: 300px;
            height: 50px;
            text-align: center;
            border: 1px solid lightgray;
            border-radius: 10px;
            margin-left: 5px;
            float: left;
        }
        a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>
