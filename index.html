<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김중석 홈페이지</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* 💡 패딩과 테두리가 박스 크기를 키우지 않도록 고정 */
        }
        body{
            background-color: white;
        }
        h1{
            height: 80px;
            text-align: center;
            line-height: 80px; /* 제목 글자도 세로 정중앙에 배치 */
        }
        
        /* 💡 300px짜리 박스 3개(=900px)와 사이 간격 20px 두 번(=40px)을 합친 완벽한 너비 */
        .all {
            width: 940px;       /* ❌ 기존 1200px에서 박스 총 크기인 940px로 수정 */
            margin: 0 auto;     /* 💡 왼쪽/오른쪽 여백을 똑같이 나눠 가져 화면 정중앙에 배치 */
            display: flex;
            flex-direction: column; /* 줄들을 위에서 아래로 나열 */
            gap: 20px;          /* 💡 html1, html2, html3 줄 사이의 세로 간격 */
        }

        /* 4. 각 행(Row)을 가로로 나란히 배치 (Flexbox) */
        .html1, .html2, .html3 {
            display: flex;
            justify-content: space-between; /* 💡 3개의 박스를 좌우 끝에 맞춰 균등 배분 */
        }

        /* 5. 개별 카드(박스) 스타일 */
        .div1, .div2, .div3 {
            width: 300px;
            height: 80px;       /* 💡 유한대학교 글자가 삐져나오지 않도록 높이를 늘림 */
            border: 1px solid lightgray;
            border-radius: 10px;
            
            /* 💡 박스 내부의 텍스트들을 상하좌우 정중앙에 정렬 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            /* ❌ 정렬을 방해하던 구형 속성(float, margin-left) 완전 삭제 */
        }
        
        a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
    <h1><b>김중석의 홈페이지</b></h1>
    <div class="all">
        <div class="html1">
            <div class="div1">
                <b>유한대학교 컴퓨터공학과 게임콘텐츠전공</b> <br>
                <a href="#">클릭하세요~</a>    
            </div>
            <div class="div1">
                <b>김채현의 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div1">
                <b>z-index 실습</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
        </div>
        <div class="html2">
            <div class="div2">
                <b>티몬 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div2">
                <b>티몬 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div2">
                <b>티몬 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
        </div>
        <div class="html3">
            <div class="div3">
                <b>티몬 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div3">
                <b>티몬 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div3">
                <b>티몬 홈페이지</b> <br>
                <a href="#">클릭하세요~</a>s </div>
        </div>
    </div>
</body>
</html>
