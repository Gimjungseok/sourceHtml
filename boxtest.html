<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글씨가 있는 색깔 상자 만들기 (Flexbox)</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box; /* 패딩이나 테두리로 인해 크기가 늘어나는 것을 방지 */
        }
        
        /* 1. 행(Row) 역할을 하는 부모 태그들을 플렉스 상자로 만듭니다. */
        section, footer {
            display: flex;
            width: 400px; /* 200px 박스 2개가 딱 맞물리도록 400px로 수정 */
        }

        /* 2. 개별 상자(.box)도 플렉스로 만들어 내부 글자(span)를 중앙 정렬합니다. */
        .box {
            display: flex;           /* 🔥 내부 요소를 정렬하기 위해 플렉스 적용 */
            justify-content: center; /* 🔥 가로 정중앙 정렬 */
            align-items: center;     /* 🔥 세로 정중앙 정렬 */
            width: 200px;
            height: 100px;
            color: white;

            /* ❌ float: left; 와 position: relative; text-align은 이제 필요 없으므로 삭제 */
        }

        /* 3. 부모인 .box가 알아서 정중앙으로 밀어주므로 span의 복잡한 위치 속성은 다 지웁니다. */
        span {
            /* ❌ position: absolute; 와 transform 속성들 완전 삭제 */
        }

        #bg1{ background-color: skyblue; }
        #bg2{ background-color: hotpink; }
        #bg3{ background-color: yellow; color: black; }
        #bg4{ background-color: black; }
    </style>
</head>
<body>
    <div class="all">
        <section>
            <div class="box" id="bg1"><span>skyblue</span></div>
            <div class="box" id="bg2"><span>hotpink</span></div>
        </section>
        <footer>
            <div class="box" id="bg3"><span>yellow</span></div>
            <div class="box" id="bg4"><span>black</span></div>
        </footer>
    </div>
</body>
</html>
